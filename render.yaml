services:
  - type: web
    name: vindesertao-api
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: vindesertao-db
          property: connectionString
      - key: APP_CORS_ORIGINS
        value: https://vindesertao-app.onrender.com
      - key: JWT_ISSUER
        value: vinde-sertao
      - key: JWT_PRIVATE_KEY_LOCATION
        value: /etc/secrets/privateKey.pem
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: vinde-sertao/visitas
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_MOCK
        value: "false"
      - key: SMTP_START_TLS
        value: REQUIRED
      - key: FRONTEND_URL
        value: https://vindesertao-app.onrender.com
      - key: RESET_PASSWORD_EXPIRATION_MINUTES
        value: "30"

  - type: web
    name: vindesertao-app
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist/vinde-sertao-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: vindesertao-db
    plan: basic-256mb
    databaseName: vinde_sertao
    user: vinde
