services:
  db:
    image: postgis/postgis:16-3.4
    container_name: vinde-sertao-db
    environment:
      POSTGRES_DB: vinde_sertao
      POSTGRES_USER: vinde
      POSTGRES_PASSWORD: vinde
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinde -d vinde_sertao"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: vinde-sertao-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/vinde_sertao
      QUARKUS_DATASOURCE_USERNAME: vinde
      QUARKUS_DATASOURCE_PASSWORD: vinde
      APP_CORS_ORIGINS: http://localhost:4200,http://localhost
      JWT_ISSUER: vinde-sertao
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-vinde-sertao/visitas}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: vinde-sertao-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  pgdata:
