quarkus.application.name=vinde-sertao-backend
quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:vinde}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:vinde}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/vinde_sertao}
quarkus.datasource.jdbc.min-size=${QUARKUS_DATASOURCE_JDBC_MIN_SIZE:0}
quarkus.datasource.jdbc.initial-size=${QUARKUS_DATASOURCE_JDBC_INITIAL_SIZE:0}
quarkus.datasource.jdbc.max-size=${QUARKUS_DATASOURCE_JDBC_MAX_SIZE:5}
quarkus.datasource.jdbc.acquisition-timeout=${QUARKUS_DATASOURCE_JDBC_ACQUISITION_TIMEOUT:60S}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.jackson.fail-on-unknown-properties=false

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:vinde-sertao/visitas}

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.reset-password.expiration-minutes=${RESET_PASSWORD_EXPIRATION_MINUTES:30}

quarkus.mailer.host=${SMTP_HOST:localhost}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.username=${SMTP_USERNAME:}
quarkus.mailer.password=${SMTP_PASSWORD:}
quarkus.mailer.from=${SMTP_FROM:naoresponda@vindesertao.local}
quarkus.mailer.mock=${SMTP_MOCK:true}
quarkus.mailer.start-tls=${SMTP_START_TLS:OPTIONAL}

quarkus.http.cors=true
quarkus.http.cors.origins=${APP_CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.access-control-allow-credentials=true

mp.jwt.verify.issuer=${JWT_ISSUER:vinde-sertao}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:vinde;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.flyway.locations=db/test
%test.quarkus.http.test-port=0
%test.quarkus.mailer.mock=true
